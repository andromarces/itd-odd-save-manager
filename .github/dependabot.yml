version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
  - package-ecosystem: 'rust-toolchain'
    directory: '/'
    schedule:
      interval: 'daily'
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      vitest:
        patterns:
          - vitest
          - '@vitest/*'
    open-pull-requests-limit: 10
    rebase-strategy: auto

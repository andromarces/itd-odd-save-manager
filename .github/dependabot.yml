version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

  - package-ecosystem: "rust-toolchain"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      vitest:
        patterns:
          - vitest
          - "@vitest/coverage-v8"
          - "@vitest/*"
      git-hooks:
        patterns:
          - husky
          - lint-staged
      ox-tooling:
        patterns:
          - oxfmt
          - oxlint
    open-pull-requests-limit: 10
    rebase-strategy: auto

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "daily"
    groups:
      tauri-rust:
        patterns:
          - "tauri"
          - "tauri-*"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
